<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Portal - Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        h1 {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem !important;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        a:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .nav-links {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>ERP Portal - Finance</h1>
        <div class="nav-links">
            <a href="index.html">Finance</a> | 
            <a href="sales.html">Sales</a> | 
            <a href="crm.html">CRM</a> | 
            <a href="production.html">Production</a> | 
            <a href="supply_chain.html">Supply Chain</a>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Revenue vs Expenses</h5>
                        <canvas id="revExpChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Profit Trend</h5>
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Budget Allocation</h5>
                        <canvas id="budgetChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Cash Flow</h5>
                        <canvas id="cashFlowChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">AR Aging</h5>
                        <canvas id="arChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        // Premium Dark Theme Defaults for Chart.js
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.scale.grid.borderColor = 'rgba(255, 255, 255, 0.1)';
        Chart.defaults.maintainAspectRatio = true;
        Chart.defaults.aspectRatio = 1.5;

var ctx1 = document.getElementById('revExpChart').getContext('2d');
        var revExpChart = new Chart(ctx1, { type: 'bar', data: { labels: [], datasets: [{label: 'Revenue', data: [], backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 4}, {label: 'Expenses', data: [], backgroundColor: 'rgba(239, 68, 68, 0.8)', borderRadius: 4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx2 = document.getElementById('profitChart').getContext('2d');
        var profitChart = new Chart(ctx2, { type: 'line', data: { labels: [], datasets: [{label: 'Profit', data: [], borderColor: 'rgba(16, 185, 129, 1)', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, fill: true, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx3 = document.getElementById('budgetChart').getContext('2d');
        var budgetChart = new Chart(ctx3, { type: 'pie', data: { labels: ['Marketing', 'R&D', 'Ops', 'HR'], datasets: [{data: [], backgroundColor: ['rgba(59, 130, 246, 0.8)', 'rgba(139, 92, 246, 0.8)', 'rgba(245, 158, 11, 0.8)', 'rgba(236, 72, 153, 0.8)'], borderWidth: 0}] } });

        var ctx4 = document.getElementById('cashFlowChart').getContext('2d');
        var cashFlowChart = new Chart(ctx4, { type: 'radar', data: { labels: [], datasets: [{label: 'Cash In', data: [], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: 'rgba(59, 130, 246, 1)', pointBackgroundColor: 'rgba(59, 130, 246, 1)'}, {label: 'Cash Out', data: [], backgroundColor: 'rgba(239, 68, 68, 0.2)', borderColor: 'rgba(239, 68, 68, 1)', pointBackgroundColor: 'rgba(239, 68, 68, 1)'}] }, options: { elements: { line: { borderWidth: 2 } }, scales: { r: { ticks: { display: false } } } } });

        var ctx5 = document.getElementById('arChart').getContext('2d');
        var arChart = new Chart(ctx5, { type: 'doughnut', data: { labels: ['0-30 Days', '31-60 Days', '61-90 Days', '90+ Days'], datasets: [{data: [], backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(245, 158, 11, 0.8)', 'rgba(139, 92, 246, 0.8)', 'rgba(239, 68, 68, 0.8)'], borderWidth: 0, cutout: '70%'}] } });

        function fetchDataAndUpdateChart() {
            Papa.parse('data/finance.csv', {
                download: true,
                header: true,
                complete: function(results) {
                    var data = results.data.filter(row => row.Month);
                    var labels = data.map(row => row.Month);
                    
                    revExpChart.data.labels = labels;
                    revExpChart.data.datasets[0].data = data.map(row => row.Revenue);
                    revExpChart.data.datasets[1].data = data.map(row => row.Expenses);
                    revExpChart.update();

                    profitChart.data.labels = labels;
                    profitChart.data.datasets[0].data = data.map(row => row.Profit);
                    profitChart.update();

                    var lastRow = data[data.length - 1];
                    budgetChart.data.datasets[0].data = [lastRow.Budget_Marketing, lastRow.Budget_R_and_D, lastRow.Budget_Ops, lastRow.Budget_HR];
                    budgetChart.update();

                    cashFlowChart.data.labels = labels;
                    cashFlowChart.data.datasets[0].data = data.map(row => row.Cash_Flow_In);
                    cashFlowChart.data.datasets[1].data = data.map(row => row.Cash_Flow_Out);
                    cashFlowChart.update();

                    arChart.data.datasets[0].data = [lastRow.AR_0_30, lastRow.AR_31_60, lastRow.AR_61_90, lastRow.AR_90_plus];
                    arChart.update();
                },
                error: function(error) { console.error('Error fetching data:', error); }
            });
        }
        fetchDataAndUpdateChart();
    </script>
</body>
</html>
