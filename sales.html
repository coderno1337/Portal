<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Portal - Sales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        h1 {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem !important;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        a:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .nav-links {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>ERP Portal - Sales</h1>
        <div class="nav-links">
            <a href="index.html">Finance</a> | 
            <a href="sales.html">Sales</a> | 
            <a href="crm.html">CRM</a> | 
            <a href="production.html">Production</a> | 
            <a href="supply_chain.html">Supply Chain</a>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Sales vs Target</h5>
                        <canvas id="salesTargetChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Sales by Region</h5>
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Sales by Category</h5>
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Monthly Growth</h5>
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Top Products Trend</h5>
                        <canvas id="topProductsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        // Premium Dark Theme Defaults for Chart.js
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.scale.grid.borderColor = 'rgba(255, 255, 255, 0.1)';
        Chart.defaults.maintainAspectRatio = true;
        Chart.defaults.aspectRatio = 1.5;

var ctx1 = document.getElementById('salesTargetChart').getContext('2d');
        var salesTargetChart = new Chart(ctx1, { type: 'bar', data: { labels: [], datasets: [{label: 'Sales', data: [], backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 4}, {label: 'Target', data: [], type: 'line', borderColor: 'rgba(239, 68, 68, 1)', fill: false, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx2 = document.getElementById('regionChart').getContext('2d');
        var regionChart = new Chart(ctx2, { type: 'pie', data: { labels: ['North', 'South', 'East', 'West'], datasets: [{data: [], backgroundColor: ['rgba(59, 130, 246, 0.8)', 'rgba(16, 185, 129, 0.8)', 'rgba(245, 158, 11, 0.8)', 'rgba(236, 72, 153, 0.8)'], borderWidth: 0}] } });

        var ctx3 = document.getElementById('categoryChart').getContext('2d');
        var categoryChart = new Chart(ctx3, { type: 'doughnut', data: { labels: ['Electronics', 'Clothing', 'Home', 'Toys', 'Sports'], datasets: [{data: [], backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(59, 130, 246, 0.8)', 'rgba(245, 158, 11, 0.8)', 'rgba(239, 68, 68, 0.8)', 'rgba(139, 92, 246, 0.8)'], borderWidth: 0, cutout: '70%'}] } });

        var ctx4 = document.getElementById('growthChart').getContext('2d');
        var growthChart = new Chart(ctx4, { type: 'line', data: { labels: [], datasets: [{label: 'Sales Trend', data: [], borderColor: 'rgba(59, 130, 246, 1)', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, fill: true, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx5 = document.getElementById('topProductsChart').getContext('2d');
        var topProductsChart = new Chart(ctx5, { type: 'radar', data: { labels: ['Electronics', 'Clothing', 'Home', 'Toys', 'Sports'], datasets: [{label: 'Latest Month Categories', data: [], backgroundColor: 'rgba(139, 92, 246, 0.2)', borderColor: 'rgba(139, 92, 246, 1)', pointBackgroundColor: 'rgba(139, 92, 246, 1)'}] }, options: { elements: { line: { borderWidth: 2 } }, scales: { r: { ticks: { display: false } } } } });

        function fetchDataAndUpdateChart() {
            const csvData = `Month,Sales,Target,Region_North,Region_South,Region_East,Region_West,Cat_Electronics,Cat_Clothing,Cat_Home,Cat_Toys,Cat_Sports
Jan,2081,3195,427,410,824,221,1450,226,249,269,760
Feb,1197,2004,212,766,943,292,1275,748,633,572,654
Mar,3735,2229,358,476,899,531,780,466,263,159,553
Apr,3714,3077,887,499,904,404,652,559,436,512,716
May,3936,3319,658,452,692,632,444,868,1168,664,547
Jun,2701,3713,560,889,282,905,523,817,219,658,729
Jul,1039,2002,355,524,353,465,695,650,1191,527,680
Aug,3423,2602,867,217,397,683,703,977,293,429,397
Sep,4097,2619,408,385,406,297,1459,353,619,756,651
Oct,4706,3769,271,442,399,279,515,654,1102,725,574
Nov,2209,2053,486,838,820,505,1063,231,684,628,776
Dec,4752,4168,763,480,911,738,831,803,408,381,233`;
            Papa.parse(csvData, {
                header: true,
                complete: function(results) {
                    var data = results.data.filter(row => row.Month);
                    var labels = data.map(row => row.Month);
                    
                    salesTargetChart.data.labels = labels;
                    salesTargetChart.data.datasets[0].data = data.map(row => row.Sales);
                    salesTargetChart.data.datasets[1].data = data.map(row => row.Target);
                    salesTargetChart.update();

                    var lastRow = data[data.length - 1];
                    regionChart.data.datasets[0].data = [lastRow.Region_North, lastRow.Region_South, lastRow.Region_East, lastRow.Region_West];
                    regionChart.update();

                    categoryChart.data.datasets[0].data = [lastRow.Cat_Electronics, lastRow.Cat_Clothing, lastRow.Cat_Home, lastRow.Cat_Toys, lastRow.Cat_Sports];
                    categoryChart.update();

                    growthChart.data.labels = labels;
                    growthChart.data.datasets[0].data = data.map(row => row.Sales);
                    growthChart.update();

                    topProductsChart.data.datasets[0].data = [lastRow.Cat_Electronics, lastRow.Cat_Clothing, lastRow.Cat_Home, lastRow.Cat_Toys, lastRow.Cat_Sports];
                    topProductsChart.update();
                },
                error: function(error) { console.error('Error fetching data:', error); }
            });
        }
        fetchDataAndUpdateChart();
    </script>
</body>
</html>
