<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Portal - Supply Chain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        h1 {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem !important;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        a:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .nav-links {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>ERP Portal - Supply Chain</h1>
        <div class="nav-links">
            <a href="index.html">Finance</a> | 
            <a href="sales.html">Sales</a> | 
            <a href="crm.html">CRM</a> | 
            <a href="production.html">Production</a> | 
            <a href="supply_chain.html">Supply Chain</a>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">On-Time Delivery</h5>
                        <canvas id="deliveryChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Supplier Scores</h5>
                        <canvas id="supplierChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Freight Costs</h5>
                        <canvas id="freightChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Inventory Turnover</h5>
                        <canvas id="turnoverChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Lead Times</h5>
                        <canvas id="leadTimeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        // Premium Dark Theme Defaults for Chart.js
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.scale.grid.borderColor = 'rgba(255, 255, 255, 0.1)';
        Chart.defaults.maintainAspectRatio = true;
        Chart.defaults.aspectRatio = 1.5;

var ctx1 = document.getElementById('deliveryChart').getContext('2d');
        var deliveryChart = new Chart(ctx1, { type: 'line', data: { labels: [], datasets: [{label: 'On-Time Delivery %', data: [], borderColor: 'rgba(16, 185, 129, 1)', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, fill: true, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx2 = document.getElementById('supplierChart').getContext('2d');
        var supplierChart = new Chart(ctx2, { type: 'bar', data: { labels: [], datasets: [{label: 'Supplier A', data: [], backgroundColor: 'rgba(239, 68, 68, 0.8)', borderRadius: 4}, {label: 'Supplier B', data: [], backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx3 = document.getElementById('freightChart').getContext('2d');
        var freightChart = new Chart(ctx3, { type: 'pie', data: { labels: ['Air', 'Sea', 'Land'], datasets: [{data: [], backgroundColor: ['rgba(239, 68, 68, 0.8)', 'rgba(59, 130, 246, 0.8)', 'rgba(139, 92, 246, 0.8)'], borderWidth: 0}] } });

        var ctx4 = document.getElementById('turnoverChart').getContext('2d');
        var turnoverChart = new Chart(ctx4, { type: 'radar', data: { labels: [], datasets: [{label: 'Inv Turnover Rate', data: [], backgroundColor: 'rgba(139, 92, 246, 0.2)', borderColor: 'rgba(139, 92, 246, 1)', pointBackgroundColor: 'rgba(139, 92, 246, 1)'}] }, options: { elements: { line: { borderWidth: 2 } }, scales: { r: { ticks: { display: false } } } } });

        var ctx5 = document.getElementById('leadTimeChart').getContext('2d');
        var leadTimeChart = new Chart(ctx5, { type: 'polarArea', data: { labels: ['Raw Materials', 'Packaging'], datasets: [{data: [], backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(245, 158, 11, 0.8)'], borderWidth: 0}] }, options: { scales: { r: { ticks: { display: false } } } } });

        function fetchDataAndUpdateChart() {
            Papa.parse('data/supply_chain.csv', {
                download: true,
                header: true,
                complete: function(results) {
                    var data = results.data.filter(row => row.Month);
                    var labels = data.map(row => row.Month);
                    
                    deliveryChart.data.labels = labels;
                    deliveryChart.data.datasets[0].data = data.map(row => row.On_Time_Delivery);
                    deliveryChart.update();

                    supplierChart.data.labels = labels;
                    supplierChart.data.datasets[0].data = data.map(row => row.Supplier_A_Score);
                    supplierChart.data.datasets[1].data = data.map(row => row.Supplier_B_Score);
                    supplierChart.update();

                    var lastRow = data[data.length - 1];
                    freightChart.data.datasets[0].data = [lastRow.Freight_Air, lastRow.Freight_Sea, lastRow.Freight_Land];
                    freightChart.update();

                    turnoverChart.data.labels = labels;
                    turnoverChart.data.datasets[0].data = data.map(row => row.Inv_Turnover);
                    turnoverChart.update();

                    var lastRow = data[data.length - 1];
                    leadTimeChart.data.datasets[0].data = [lastRow.Lead_Time_Raw, lastRow.Lead_Time_Pack];
                    leadTimeChart.update();
                },
                error: function(error) { console.error('Error fetching data:', error); }
            });
        }
        fetchDataAndUpdateChart();
    </script>
</body>
</html>
