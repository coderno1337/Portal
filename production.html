<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Portal - Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        h1 {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem !important;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        a:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .nav-links {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>ERP Portal - Production</h1>
        <div class="nav-links">
            <a href="index.html">Finance</a> | 
            <a href="sales.html">Sales</a> | 
            <a href="crm.html">CRM</a> | 
            <a href="production.html">Production</a> | 
            <a href="supply_chain.html">Supply Chain</a>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Output vs Capacity</h5>
                        <canvas id="outputChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Defect Rate</h5>
                        <canvas id="defectChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Downtime Breakdown</h5>
                        <canvas id="downtimeChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Production Costs</h5>
                        <canvas id="costChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Inventory Levels</h5>
                        <canvas id="invChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        // Premium Dark Theme Defaults for Chart.js
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.scale.grid.borderColor = 'rgba(255, 255, 255, 0.1)';
        Chart.defaults.maintainAspectRatio = true;
        Chart.defaults.aspectRatio = 1.5;

var ctx1 = document.getElementById('outputChart').getContext('2d');
        var outputChart = new Chart(ctx1, { type: 'bar', data: { labels: [], datasets: [{label: 'Output', data: [], backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 4}, {label: 'Capacity', data: [], type: 'line', borderColor: 'rgba(239, 68, 68, 1)', fill: false, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx2 = document.getElementById('defectChart').getContext('2d');
        var defectChart = new Chart(ctx2, { type: 'line', data: { labels: [], datasets: [{label: 'Defect Rate %', data: [], borderColor: 'rgba(16, 185, 129, 1)', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, fill: true, tension: 0.4}] }, options: { scales: { y: { beginAtZero: true } } } });

        var ctx3 = document.getElementById('downtimeChart').getContext('2d');
        var downtimeChart = new Chart(ctx3, { type: 'polarArea', data: { labels: ['Maintenance', 'Breakdown', 'Setup'], datasets: [{data: [], backgroundColor: ['rgba(239, 68, 68, 0.8)', 'rgba(59, 130, 246, 0.8)', 'rgba(139, 92, 246, 0.8)'], borderWidth: 0}] }, options: { scales: { r: { ticks: { display: false } } } } });

        var ctx4 = document.getElementById('costChart').getContext('2d');
        var costChart = new Chart(ctx4, { type: 'radar', data: { labels: [], datasets: [{label: 'Labor', data: [], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: 'rgba(59, 130, 246, 1)', pointBackgroundColor: 'rgba(59, 130, 246, 1)'}, {label: 'Materials', data: [], backgroundColor: 'rgba(239, 68, 68, 0.2)', borderColor: 'rgba(239, 68, 68, 1)', pointBackgroundColor: 'rgba(239, 68, 68, 1)'}] }, options: { elements: { line: { borderWidth: 2 } }, scales: { r: { ticks: { display: false } } } } });

        var ctx5 = document.getElementById('invChart').getContext('2d');
        var invChart = new Chart(ctx5, { type: 'doughnut', data: { labels: ['Raw', 'WIP', 'Finished'], datasets: [{data: [], backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(59, 130, 246, 0.8)', 'rgba(245, 158, 11, 0.8)'], borderWidth: 0, cutout: '70%'}] } });

        function fetchDataAndUpdateChart() {
            const csvData = `Month,Output,Capacity,Defect_Rate,Downtime_Maintenance,Downtime_Breakdown,Downtime_Setup,Cost_Labor,Cost_Materials,Cost_Overhead,Inv_Raw,Inv_WIP,Inv_Finished
Jan,6477,8000,2.1632505745522748,38,11,14,19131,26935,7960,1261,1509,5381
Feb,8729,11366,1.9022004627356952,49,6,35,10493,16228,7293,1391,1655,6535
Mar,8382,9454,2.880896758017707,14,15,27,17524,23310,6497,3514,1396,5562
Apr,6912,9657,2.632452147961746,48,19,17,19270,17707,7941,4569,1893,4328
May,8473,11316,1.971913046405224,42,15,12,13241,23239,9987,1025,598,2034
Jun,10836,11759,2.4956890395849163,13,7,13,18151,22430,6321,1996,1197,2689
Jul,9672,10287,0.6181520076296505,50,24,21,10580,17278,8857,2489,1068,2613
Aug,8481,10239,2.24886022431756,35,15,39,19535,23716,5621,3015,1999,3221
Sep,7984,9077,2.1038449914380646,39,12,30,11307,17195,9013,2095,837,5171
Oct,7134,8472,2.167887248487872,18,8,14,19261,17459,8994,4817,1448,6966
Nov,7329,8409,0.6271141335530526,16,23,18,18216,17304,9740,2016,999,7164
Dec,6196,8560,0.7059925580652613,24,23,30,10378,27842,7933,4616,788,3992`;
            Papa.parse(csvData, {
                header: true,
                complete: function(results) {
                    var data = results.data.filter(row => row.Month);
                    var labels = data.map(row => row.Month);
                    
                    outputChart.data.labels = labels;
                    outputChart.data.datasets[0].data = data.map(row => row.Output);
                    outputChart.data.datasets[1].data = data.map(row => row.Capacity);
                    outputChart.update();

                    defectChart.data.labels = labels;
                    defectChart.data.datasets[0].data = data.map(row => row.Defect_Rate);
                    defectChart.update();

                    var lastRow = data[data.length - 1];
                    downtimeChart.data.datasets[0].data = [lastRow.Downtime_Maintenance, lastRow.Downtime_Breakdown, lastRow.Downtime_Setup];
                    downtimeChart.update();

                    costChart.data.labels = labels;
                    costChart.data.datasets[0].data = data.map(row => row.Cost_Labor);
                    costChart.data.datasets[1].data = data.map(row => row.Cost_Materials);
                    costChart.update();

                    invChart.data.datasets[0].data = [lastRow.Inv_Raw, lastRow.Inv_WIP, lastRow.Inv_Finished];
                    invChart.update();
                },
                error: function(error) { console.error('Error fetching data:', error); }
            });
        }
        fetchDataAndUpdateChart();
    </script>
</body>
</html>
